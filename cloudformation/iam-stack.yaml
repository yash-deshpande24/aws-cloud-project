AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Stack — roles, policies, instance profiles

Parameters:
  ProjectName:
    Type: String

Resources:
  # ─── EC2 Role ─────────────────────────────────────────────────────────────
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-ec2-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  EC2S3Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ProjectName}-ec2-s3-policy"
      Roles: [!Ref EC2Role]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3BucketAccess
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:aws:s3:::${ProjectName}-*"
              - !Sub "arn:aws:s3:::${ProjectName}-*/*"
          - Sid: CloudWatchLogs
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource: "*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectName}-instance-profile"
      Roles: [!Ref EC2Role]

  # ─── Deploy User ──────────────────────────────────────────────────────────
  DeployUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub "${ProjectName}-deploy-user"
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  DeployUserPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${ProjectName}-deploy-policy"
      Users: [!Ref DeployUser]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3DeployAccess
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
              - s3:DeleteObject
            Resource:
              - !Sub "arn:aws:s3:::${ProjectName}-*"
              - !Sub "arn:aws:s3:::${ProjectName}-*/*"
          - Sid: CloudFormationRead
            Effect: Allow
            Action:
              - cloudformation:DescribeStacks
              - cloudformation:ListStackResources
            Resource: "*"

  DeployUserAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref DeployUser

  # ─── Read-Only Role ───────────────────────────────────────────────────────
  ReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-readonly-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

Outputs:
  EC2InstanceProfile:
    Value: !Ref EC2InstanceProfile
  EC2RoleArn:
    Value: !GetAtt EC2Role.Arn
  DeployUserAccessKeyId:
    Value: !Ref DeployUserAccessKey
  DeployUserSecretKey:
    Value: !GetAtt DeployUserAccessKey.SecretAccessKey
